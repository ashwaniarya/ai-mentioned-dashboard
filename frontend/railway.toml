# Railway: set this service Root Directory to "frontend" in the project dashboard.
# Set NEXT_PUBLIC_API_URL to the backend public URL before build (Railway Variables).
#
# Tests are not run here: Railway build often has NODE_ENV=production, which breaks
# React 19 + Testing Library (React.act missing in react.production). Run tests in a
# separate phase (e.g. GitHub Actions job) before deploy; this step is install + prod build only.

[build]
builder = "RAILPACK"
buildCommand = "npm ci --include=dev && npm run build"

[deploy]
startCommand = "npx next start -H 0.0.0.0 -p $PORT"
